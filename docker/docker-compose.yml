  load-runner-go:
    build:
      context: ..
      dockerfile: docker/Dockerfile.k8s.go
    container_name: benchmark-load-runner-go
    command: ["sleep", "infinity"]
    environment:
      POSTGRES_HOST: postgres-primary
      CLICKHOUSE_HOST: clickhouse-1
    cpus: "2"
    mem_limit: 2g
    mem_reservation: 512m
    depends_on:
      postgres-primary:
        condition: service_healthy
      postgres-replica:
        condition: service_healthy
      clickhouse-1:
        condition: service_healthy
      clickhouse-2:
        condition: service_healthy
    # Exec in and run: /app/loadrunner --database postgres --duration 60
    # Or: /app/loadrunner --database clickhouse --duration 60

