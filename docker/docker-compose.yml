# 5 containers: postgres primary, postgres replica, clickhouse (2 replicas), load-runner-go.
# Configurations aligned with deployments/postgres.yaml, deployments/clickhouse.yaml, deployments/load-runner-go.yaml.
# Writer: postgres-primary (schema, inserts). Reader: postgres-replica (read-only). ClickHouse: single shard, 2 replicas.
# Run from repo root: docker compose -f docker/docker-compose.yml up -d

services:
  postgres-primary:
    image: postgres:18-alpine
    container_name: benchmark-postgres-primary
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: default
      REPLICATION_PASSWORD: strongpassword
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ./scripts:/docker-entrypoint-initdb.d
      - postgres-primary-data:/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    cpus: "2"
    mem_limit: 2g
    mem_reservation: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U default -d default"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-replica:
    image: postgres:18-alpine
    container_name: benchmark-postgres-replica
    user: "0"
    entrypoint: []
    command: ["/bin/sh", "/replica-init.sh"]
    environment:
      POSTGRES_USER: default
      POSTGRES_PASSWORD: strongpassword
      POSTGRES_DB: default
      PGDATA: /var/lib/postgresql/data
    volumes:
      - ./postgres-replica-init.sh:/replica-init.sh:ro
      - postgres-replica-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    cpus: "1.5"
    mem_limit: 1536m
    mem_reservation: 512m
    depends_on:
      postgres-primary:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U default -d default"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

