# Load-runner pod for running benchmarks against postgres/clickhouse in the benchmark namespace.
# Build an image that includes the app: docker build -f docker/Dockerfile.k8s -t load-runner:latest .
# Then run: kubectl apply -f deploy-load-runner.yaml
# Exec in and run: python main.py --database postgres --duration 60
# Or: python main.py --database clickhouse --duration 60

apiVersion: apps/v1
kind: Deployment
metadata:
  name: load-runner-python
  namespace: clickhouse
  labels:
    app: load-runner-python
spec:
  replicas: 2
  selector:
    matchLabels:
      app: load-runner-python
  template:
    metadata:
      labels:
        app: load-runner-python
    spec:
      containers:
      - name: load-runner-python
        image: devgwrxacr.azurecr.io/bikash/db-benchmarking-python:v0.0.1
        imagePullPolicy: IfNotPresent
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: 4
            memory: 8Gi
          limits:
            cpu: 4
            memory: 8Gi
        env:
        - name: CLICKHOUSE_HOST
          value: chi-clickhouse-dev-cluster-replica0
        - name: POSTGRES_HOST
          value: postgres
